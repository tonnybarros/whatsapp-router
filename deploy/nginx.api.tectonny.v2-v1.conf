server {
    listen 80;
    server_name api.tectonny.com.br;

    access_log /var/log/nginx/api_tectonny_access.log;
    error_log  /var/log/nginx/api_tectonny_error.log;

    location /v1/ {
        proxy_pass http://127.0.0.1:3026/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        sub_filter_once off;
        sub_filter_types text/html application/javascript application/json;
        sub_filter "fetch('/api" "fetch('/v1/api";
        sub_filter "fetch('/health" "fetch('/v1/health";
        sub_filter 'url: "/openapi.json"' 'url: "/v1/openapi.json"';
        sub_filter '"https://api.tectonny.com.br"' '"https://api.tectonny.com.br/v1"';
    }

    location = /v1 {
        return 301 /v1/;
    }

    location / {
        proxy_pass http://127.0.0.1:3025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
